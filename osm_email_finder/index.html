<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>NY Firma Email Bulucu (OpenStreetMap)</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #171a23;
    --accent: #4f8cff;
    --accent2: #22c55e;
    --text: #e6e8ec;
    --muted: #8a90a2;
    --border: #262a36;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 16px;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: var(--muted); margin-top: 0; font-size: 14px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .search-row { display: flex; gap: 10px; }
  input[type=text] {
    flex: 1;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #10131b;
    color: var(--text);
    font-size: 15px;
  }
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    cursor: pointer;
    font-weight: 600;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .bar-outer {
    width: 100%;
    height: 12px;
    background: #10131b;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 16px;
    border: 1px solid var(--border);
  }
  .bar-inner {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
  }
  .stats { display: flex; gap: 24px; margin-top: 12px; font-size: 14px; color: var(--muted); flex-wrap: wrap; }
  .stats b { color: var(--text); font-size: 16px; }
  .status-line { margin-top: 10px; font-size: 13px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; }
  tr:hover { background: #1c202c; }
  .download-btn { background: var(--accent2); }
  .hidden { display: none; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    background: #1c2a1e; color: var(--accent2); font-size: 12px; font-weight: 600;
  }
  .error-box { background: #2a1616; border: 1px solid #4a2323; color: #ff8080; padding: 12px; border-radius: 8px; margin-top: 12px; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>New York Eyaleti Firma / Email Bulucu</h1>
  <p class="sub">OpenStreetMap (Overpass API) — ücretsiz, açık kaynak veri.</p>

  <div class="card">
    <div class="search-row">
      <input type="text" id="keyword" placeholder="Örn: auto, restaurant, dentist, plumber..." />
      <button id="searchBtn" onclick="startSearch()">Ara</button>
    </div>

    <div class="bar-outer"><div class="bar-inner" id="bar"></div></div>
    <div class="stats">
      <div>İlerleme: <b id="percentText">0%</b></div>
      <div>İşlenen: <b id="processedText">0</b> / <span id="totalText">0</span></div>
      <div>Bulunan Email: <b id="emailCount" style="color:var(--accent2)">0</b></div>
    </div>
    <div class="status-line" id="statusLine">Hazır. Bir anahtar kelime girip Ara'ya basın.</div>
    <div id="errorBox" class="error-box hidden"></div>
  </div>

  <div class="card hidden" id="resultsCard">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span class="badge" id="resultBadge">0 sonuç</span>
      <button class="download-btn" id="downloadBtn" onclick="downloadExcel()" disabled>Excel İndir (.xlsx)</button>
    </div>
    <table id="resultsTable">
      <thead>
        <tr><th>Firma Adı</th><th>Adres</th><th>Telefon</th><th>Email</th></tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>
</div>

<script>
let pollTimer = null;

function startSearch() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) { alert('Lütfen bir anahtar kelime girin.'); return; }

  document.getElementById('searchBtn').disabled = true;
  document.getElementById('errorBox').classList.add('hidden');
  document.getElementById('resultsCard').classList.remove('hidden');
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('resultsBody').innerHTML = '';
  document.getElementById('statusLine').textContent = 'Aranıyor...';

  fetch('/search', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({keyword})
  }).then(r => r.json()).then(data => {
    if (data.error) {
      showError(data.error);
      document.getElementById('searchBtn').disabled = false;
      return;
    }
    pollTimer = setInterval(pollProgress, 1000);
  });
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = 'Hata: ' + msg;
  box.classList.remove('hidden');
}

function pollProgress() {
  fetch('/progress').then(r => r.json()).then(data => {
    document.getElementById('bar').style.width = data.percent + '%';
    document.getElementById('percentText').textContent = data.percent + '%';
    document.getElementById('processedText').textContent = data.processed;
    document.getElementById('totalText').textContent = data.total;
    document.getElementById('emailCount').textContent = data.emails_found;

    if (data.status === 'searching') {
      document.getElementById('statusLine').textContent = 'OpenStreetMap üzerinde firmalar aranıyor...';
    } else if (data.status === 'processing') {
      document.getElementById('statusLine').textContent = `İşleniyor: ${data.processed}/${data.total} firma tarandı, web sitelerinde email aranıyor...`;
    } else if (data.status === 'done') {
      document.getElementById('statusLine').textContent = 'Tamamlandı.';
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('downloadBtn').disabled = false;
      clearInterval(pollTimer);
      loadResults();
    } else if (data.status === 'error') {
      showError(data.error);
      document.getElementById('searchBtn').disabled = false;
      clearInterval(pollTimer);
    }
  });
}

function loadResults() {
  fetch('/results').then(r => r.json()).then(rows => {
    const body = document.getElementById('resultsBody');
    body.innerHTML = '';
    rows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${row['Firma Adı']}</td><td>${row['Adres']}</td><td>${row['Telefon']}</td><td>${row['Email']}</td>`;
      body.appendChild(tr);
    });
    document.getElementById('resultBadge').textContent = rows.length + ' sonuç (email bulunan)';
  });
}

function downloadExcel() {
  window.location.href = '/download';
}

window.addEventListener('DOMContentLoaded', () => {
  fetch('/progress').then(r => r.json()).then(data => {
    if (data.status === 'searching' || data.status === 'processing') {
      document.getElementById('searchBtn').disabled = true;
      document.getElementById('resultsCard').classList.remove('hidden');
      pollTimer = setInterval(pollProgress, 1000);
    } else if (data.status === 'done') {
      document.getElementById('resultsCard').classList.remove('hidden');
      document.getElementById('downloadBtn').disabled = false;
      pollProgress();
      loadResults();
    }
  });
});
</script>
</body>
</html>
